name: Quality checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  calibration_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile source
        run: python -m py_compile main.py calibration.py tests/test_calibration.py
      - name: Run calibration tests
        run: python -m unittest discover -s tests -v
